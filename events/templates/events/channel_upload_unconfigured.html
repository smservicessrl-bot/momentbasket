<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feltöltés · Nem elérhető</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Lora", Georgia, serif;
            background: linear-gradient(135deg, #f9e0ff 0%, #c8f5ff 50%, #ffe4d6 100%);
            color: #2b2d42;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .card {
            max-width: 28rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 12px 40px -20px rgba(0, 0, 0, 0.2);
        }
        h1 { font-size: 1.35rem; margin: 0 0 0.75rem; }
        p { margin: 0; color: #6c7286; line-height: 1.55; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Feltöltés még nincs beállítva</h1>
        <p>Ez a feltöltési link még nincs hozzárendelve eseményhez. Kérjük, jelezd a szervezőnek, vagy próbáld újra később.</p>
    </div>
</body>
</html>
